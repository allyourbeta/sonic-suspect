<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonic Suspect — A Cartesia Voice Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#f7f8fa;color:#2d2d3a;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}

/* NAV */
.nav{height:56px;background:#ff6b6b;display:flex;align-items:center;padding:0 20px;position:relative;z-index:10}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:#fff;display:flex;align-items:center;gap:8px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:20px}
.nav-stat{text-align:center;color:#fff}
.nav-stat-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:1px}
.nav-stat-value{font-size:18px;font-weight:700;font-family:'Syne',sans-serif}
.nav-mode{font-size:12px;color:rgba(255,255,255,0.8);font-weight:500}
.btn-reset{padding:6px 14px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-reset:hover{background:rgba(255,255,255,0.35)}

/* PROGRESS BAR */
.progress-bar{height:3px;background:#e2e5ec;position:relative}
.progress-fill{height:100%;background:#ff6b6b;transition:width .4s ease}

/* MAIN LAYOUT */
.main{display:flex;max-width:1100px;margin:0 auto;padding:20px 16px;gap:16px;align-items:flex-start}
.grid-area{flex:1;display:flex;flex-direction:column;align-items:center}
.sidebar{width:224px;flex-shrink:0;background:#fff;border:1px solid #e2e5ec;border-radius:12px;padding:12px;position:sticky;top:20px}

/* DIFFICULTY SELECTOR */
.diff-bar{display:flex;gap:4px;margin-bottom:10px}
.diff-btn{flex:1;padding:6px 0;border:1px solid #e2e5ec;border-radius:6px;background:#fff;color:#6b7280;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.diff-btn.active{background:#ff6b6b;color:#fff;border-color:#ff6b6b}
.diff-btn:hover:not(.active){background:#fff0f0;border-color:#ff6b6b}

/* CARD GRID */
.card-grid{display:grid;gap:10px;width:100%}
.grid-2x2{grid-template-columns:repeat(2,1fr);max-width:340px}
.grid-3x3{grid-template-columns:repeat(3,1fr);max-width:480px}
.grid-4x4{grid-template-columns:repeat(4,1fr);max-width:620px}

/* CARDS */
.card{aspect-ratio:1;perspective:600px;user-select:none;cursor:pointer}
.card.solved{cursor:default}
.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card.solved .card-inner{transform:rotateY(180deg)}

.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}

.card-front{border:2px solid transparent;transition:border-color .2s,box-shadow .2s}
.card-front .card-icon{font-size:28px;opacity:.8}
.card-front .card-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:#6b7280}

/* Card states */
.card.playing .card-front{border-color:currentColor;box-shadow:0 0 16px rgba(0,0,0,.08)}
.card.heard .card-front{border-color:#ff6b6b;box-shadow:0 0 12px rgba(255,107,107,.2)}
.card.heard .card-label{color:#ff6b6b;font-weight:700}

/* Solved back */
.card-back{transform:rotateY(180deg);padding:8px}
.card.solved{opacity:.5;filter:grayscale(.3)}
.card-back .solved-emoji{font-size:30px}
.card-back .solved-check{position:absolute;top:6px;right:8px;color:#38a169;font-size:16px;font-weight:700}

/* Wrong shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.card.wrong-flash{animation:shake .4s ease}
.card.wrong-flash .card-front{border-color:#e53e3e!important;box-shadow:0 0 12px rgba(229,62,62,.3)!important}

/* Penalty flash */
@keyframes penaltyUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.penalty-flash{position:absolute;top:-8px;left:50%;transform:translateX(-50%);color:#e53e3e;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;animation:penaltyUp .8s ease forwards;pointer-events:none;z-index:5}

/* Sound bars */
.sound-bars{display:flex;gap:3px;align-items:flex-end;height:28px}
.sound-bar{width:4px;border-radius:2px;background:#ff6b6b;animation:soundbar .45s ease-in-out infinite alternate}
@keyframes soundbar{from{transform:scaleY(.3)}to{transform:scaleY(1)}}

/* Pulse on playing icon */
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.card.playing .card-icon{animation:pulse 1s ease-in-out infinite}

/* SIDEBAR SUSPECTS */
.sidebar-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9ca3af;margin-bottom:8px;font-weight:600}
.suspect-list{display:flex;flex-direction:column;gap:4px;max-height:calc(100vh - 160px);overflow-y:auto}
.suspect{padding:7px 10px;border-radius:8px;border:1px solid #e2e5ec;background:#fff;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;color:#4b5563}
.suspect:hover:not(.matched){background:#fff5f5;border-color:#ff6b6b}
.suspect.selected{background:#ff6b6b;color:#fff;border-color:#ff6b6b;font-weight:700}
.suspect.matched{opacity:.45;text-decoration:line-through;cursor:default;color:#9ca3af}
.suspect-emoji{font-size:14px;line-height:1}
.suspect-check{margin-left:auto;color:#38a169;font-size:13px;font-weight:700}

/* Instructions */
.instructions{background:#fff;border:1px solid #e2e5ec;border-radius:10px;padding:12px 18px;margin-bottom:16px;font-size:13px;color:#6b7280;line-height:1.7;max-width:620px;width:100%}
.instructions strong{color:#2d2d3a}
.instructions .penalty{color:#e53e3e;font-weight:700}

/* WIN OVERLAY */
.win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .4s ease}
.win-box{background:#fff;border-radius:20px;padding:48px 40px;text-align:center;max-width:460px;width:90%;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.win-emoji{font-size:64px;margin-bottom:8px}
.win-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#2d2d3a;margin-bottom:4px}
.win-sub{color:#9ca3af;font-size:14px;margin-bottom:32px}
.win-stats{display:flex;gap:0;align-items:center;margin-bottom:32px;background:#f7f8fa;border-radius:12px;padding:20px 16px;border:1px solid #e2e5ec}
.win-stat{flex:1;text-align:center}
.win-stat-val{font-size:28px;font-weight:700;font-family:'Syne',sans-serif}
.win-stat-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;margin-top:4px}
.win-op{color:#d1d5db;font-size:22px;padding:0 6px}
.win-btn{padding:14px 36px;background:#ff6b6b;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin:0 6px;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(255,107,107,.3)}
.win-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,107,.4)}
.win-btn.secondary{background:#e2e5ec;color:#4b5563;box-shadow:none}
.win-btn.secondary:hover{background:#d1d5db;box-shadow:none}

/* Confetti */
@keyframes confetti-fall{0%{transform:translateY(-10vh) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;width:8px;height:8px;top:-10px;z-index:201;pointer-events:none;border-radius:2px;animation:confetti-fall linear forwards}

@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}

/* Pastel card colors */
.pastel-lavender{background:#e8e0f0}
.pastel-rose{background:#f5dde5}
.pastel-mint{background:#d5f0e8}
.pastel-peach{background:#fce4d6}
.pastel-sky{background:#ddeaf8}
.pastel-lilac{background:#ecddf5}
</style>
</head>
<body>

<div id="app"></div>

<script>
const CHARACTERS = [
  {id:1,name:"The Gruff Pirate",emoji:"\u{1F3F4}\u200D\u2620\uFE0F",color:"#FF6B2B",voiceId:"23e9e50a-0a30-4d2e-b6b6-891f73d4b4e0",emotion:"angry",speed:0.85,phrases:["Billions of blue blistering barnacles!"]},
  {id:2,name:"The Nervous Intern",emoji:"\uD83D\uDE30",color:"#2EC4B6",voiceId:"f6141af3-5f94-418c-80ed-a45d450e7e2e",emotion:"scared",speed:1.15,phrases:["Oh gosh\u2014 did I reply-all to the whole company?"]},
  {id:3,name:"The Bored Professor",emoji:"\uD83C\uDF93",color:"#7B2FBE",voiceId:"4f7f1324-1853-48a6-b294-4e78e8036a83",emotion:null,speed:0.8,phrases:["This will be on the exam. Or maybe it won't."]},
  {id:4,name:"The Hyperactive Kid",emoji:"\uD83E\uDD38",color:"#FFD000",voiceId:"f31cc6a7-c1e8-4764-980c-60a361443dd1",emotion:"excited",speed:1.4,phrases:["Are we there yet? Are we there yet?"]},
  {id:5,name:"The Evil Villain",emoji:"\uD83E\uDDB9",color:"#1A1A40",voiceId:"34d923aa-c3b5-4f21-aac7-2c1f12730d4b",emotion:"angry",speed:0.9,phrases:["I find your lack of faith disturbing."]},
  {id:6,name:"The Yoga Instructor",emoji:"\uD83E\uDDD8",color:"#06D6A0",voiceId:"7d7d769c-5ab1-4dd5-bb17-ec8d4b69d03d",emotion:"content",speed:0.75,phrases:["Breathe in... hold it... and release."]},
  {id:7,name:"The Sports Commentator",emoji:"\uD83C\uDF99\uFE0F",color:"#FF4D9E",voiceId:"fbf7d2ec-ebea-49f2-8889-a482b9b0a7ed",emotion:"excited",speed:1.3,phrases:["Down goes Frazier! Down goes Frazier!"]},
  {id:8,name:"The Sad Clown",emoji:"\uD83E\uDD21",color:"#FF9F1C",voiceId:"2f251ac3-89a9-4a77-a452-704b474ccd01",emotion:"sad",speed:0.75,phrases:["Nobody laughed at my balloon animals today."]},
  {id:9,name:"The Conspiracy Theorist",emoji:"\uD83D\uDD75\uFE0F",color:"#2EC4B6",voiceId:"1cb5b8bc-77c9-4e7c-a251-da02348e2727",emotion:"scared",speed:1.1,phrases:["If the earth is round, why did Hillary put pineapples on her pizza?"]},
  {id:10,name:"The Medieval Knight",emoji:"\u2694\uFE0F",color:"#7B2FBE",voiceId:"41f3c367-e0a8-4a85-89e0-c27bae9c9b6d",emotion:null,speed:0.85,phrases:["It's only a flesh wound."]},
  {id:11,name:"The Polite Canadian",emoji:"\uD83C\uDF41",color:"#FF4D9E",voiceId:"0a9a5903-0a30-4d2e-b6b6-891f73d4b4e0",emotion:"content",speed:1.0,phrases:["Oh gosh, I'm so sorry - I think I accidentally ran over your new Macbook Neo."]},
  {id:12,name:"The Infomercial Host",emoji:"\uD83D\uDCFA",color:"#FFD000",voiceId:"a924b0e6-9253-4711-8fc3-5cb8e0188c94",emotion:"excited",speed:1.2,phrases:["But WAIT \u2014 there's more. Heads we win tails you lose!"]},
  {id:13,name:"The Sleepy Grandpa",emoji:"\uD83D\uDC74",color:"#06D6A0",voiceId:"c99d36f3-5ffd-4253-803a-535c1bc9c306",emotion:null,speed:0.65,phrases:["Back in my day... we walked barefoot and uphill, both ways."]},
  {id:14,name:"The Malfunctioning Robot",emoji:"\uD83E\uDD16",color:"#2EC4B6",voiceId:"fb26447f-308b-471e-8b00-8e9f04284eb5",emotion:null,speed:0.95,phrases:["GREETINGS HUMAN. All systems normal. DISREGARD THE SMOKE."]},
  {id:15,name:"The Method Actor",emoji:"\uD83C\uDFAD",color:"#FF9F1C",voiceId:"71a7ad14-091c-4e8e-a314-022ece01c121",emotion:"angry",speed:1.0,phrases:["I lived on soylent green to prepare for this role."]},
  {id:16,name:"The Motivational Coach",emoji:"\uD83D\uDCAA",color:"#FF4D9E",voiceId:"6fbca103-0f7f-4e49-97ed-49a53b4f3534",emotion:"excited",speed:1.2,phrases:["Give me 100 burpees RIGHT NOW!"]}
];

const PASTEL_CLASSES = ['pastel-lavender','pastel-rose','pastel-mint','pastel-peach','pastel-sky','pastel-lilac'];
const WRONG_PENALTY = 10;
const TOTAL_TIME = 130;
const MODES = {easy:{label:'Easy',grid:'2x2',count:4,cols:2},medium:{label:'Medium',grid:'3x3',count:9,cols:3},hard:{label:'Hard',grid:'4x4',count:16,cols:4}};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function fmt(s){const m=Math.floor(Math.abs(s)/60).toString().padStart(2,'0');const sec=(Math.abs(s)%60).toString().padStart(2,'0');return`${m}:${sec}`}

// --- WEB AUDIO API SOUNDS ---
// SWAP POINT: Replace these with real audio file playback for production
let audioCtx = null;
function getAudioCtx(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}

function playCorrectSound(){
  const ctx=getAudioCtx();const now=ctx.currentTime;
  [523.25,659.25].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.25);o.connect(g);g.connect(ctx.destination);o.start(now+i*0.12);o.stop(now+i*0.12+0.25)});
}

function playWrongSound(){
  const ctx=getAudioCtx();const now=ctx.currentTime;
  [330,220].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(0.12,now+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.1+0.2);o.connect(g);g.connect(ctx.destination);o.start(now+i*0.1);o.stop(now+i*0.1+0.2)});
}

function playWinSound(){
  const ctx=getAudioCtx();const now=ctx.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((f,i)=>{const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.15,now+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,now+i*0.15+0.4);o.connect(g);g.connect(ctx.destination);o.start(now+i*0.15);o.stop(now+i*0.15+0.4)});
}

// --- CONFETTI ---
function spawnConfetti(){
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6fb7','#c084fc'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.width=(5+Math.random()*6)+'px';el.style.height=(5+Math.random()*6)+'px';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    el.style.animationDelay=(Math.random()*0.6)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}

// --- GAME STATE ---
let state = {
  mode: 'hard',
  pool: [],
  cards: [],
  nameList: [],
  matched: {},
  heard: {},
  selectedCard: null,
  selectedName: null,
  playing: null,
  wrongGuesses: 0,
  timeLeft: TOTAL_TIME,
  started: false,
  finished: false,
  phraseIndex: {},
  wrongFlash: null,
  penaltyCard: null,
  currentAudio: null
};
let timerInterval = null;

function initGame(mode){
  clearInterval(timerInterval);
  if(state.currentAudio){state.currentAudio.pause();state.currentAudio=null}
  const m=MODES[mode];
  const pool=shuffle(CHARACTERS).slice(0,m.count);
  const cards=shuffle(pool);
  const pastelAssign={};
  cards.forEach((c,i)=>{
    let cls=PASTEL_CLASSES[i%PASTEL_CLASSES.length];
    if(i>0){
      const prev=pastelAssign[cards[i-1].id];
      if(cls===prev) cls=PASTEL_CLASSES[(i+1)%PASTEL_CLASSES.length];
    }
    pastelAssign[c.id]=cls;
  });
  state={mode,pool,cards,nameList:[...pool].sort((a,b)=>a.name.localeCompare(b.name)),matched:{},heard:{},selectedCard:null,selectedName:null,playing:null,wrongGuesses:0,timeLeft:TOTAL_TIME,started:false,finished:false,phraseIndex:{},wrongFlash:null,penaltyCard:null,currentAudio:null,pastelAssign};
  render();
}

function startTimer(){
  if(state.started) return;
  state.started=true;
  timerInterval=setInterval(()=>{
    state.timeLeft--;
    if(state.timeLeft<=0){state.timeLeft=0;state.finished=true;clearInterval(timerInterval)}
    render();
  },1000);
}

async function playCardAudio(charId){
  if(state.playing) return;
  const ch=state.pool.find(c=>c.id===charId);if(!ch) return;
  const idx=state.phraseIndex[charId]||0;
  const phrase=ch.phrases[idx%ch.phrases.length];
  state.phraseIndex[charId]=idx+1;
  state.playing=charId;
  render();
  try{
    if(state.currentAudio){state.currentAudio.pause();URL.revokeObjectURL(state.currentAudio.src);state.currentAudio=null}
    const res=await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:phrase,voiceId:ch.voiceId,emotion:ch.emotion,speed:ch.speed})});
    if(!res.ok) throw new Error('Audio failed');
    const blob=await res.blob();const url=URL.createObjectURL(blob);
    const audio=new Audio(url);state.currentAudio=audio;
    audio.play();
    audio.onended=()=>{state.playing=null;URL.revokeObjectURL(url);render()};
    audio.onerror=()=>{state.playing=null;render()};
  }catch(e){
    console.error('Audio error:',e);state.playing=null;render();
  }
}

function handleCardClick(charId){
  if(state.matched[charId]||state.finished) return;
  if(!state.started) startTimer();
  state.heard[charId]=true;
  if(state.selectedCard===charId){state.selectedCard=null;render();return}
  state.selectedCard=charId;
  playCardAudio(charId);
  checkMatch();
}

function handleNameClick(charId){
  if(state.matched[charId]||state.finished) return;
  if(state.selectedName===charId){state.selectedName=null;render();return}
  state.selectedName=charId;
  render();
  checkMatch();
}

function checkMatch(){
  if(state.selectedCard===null||state.selectedName===null) return;
  const cardId=state.selectedCard;const nameId=state.selectedName;
  if(cardId===nameId){
    state.matched[cardId]=true;
    playCorrectSound();
    state.selectedCard=null;state.selectedName=null;
    const total=MODES[state.mode].count;
    if(Object.keys(state.matched).length===total){
      state.finished=true;clearInterval(timerInterval);
      playWinSound();
      setTimeout(spawnConfetti,300);
    }
    render();
  } else {
    state.wrongGuesses++;
    state.timeLeft=Math.max(0,state.timeLeft-WRONG_PENALTY);
    playWrongSound();
    state.wrongFlash=cardId;
    state.penaltyCard=cardId;
    state.selectedCard=null;state.selectedName=null;
    render();
    setTimeout(()=>{state.wrongFlash=null;state.penaltyCard=null;render()},500);
  }
}

// --- RENDER ---
function render(){
  const m=MODES[state.mode];
  const score=Math.max(0,state.timeLeft - state.wrongGuesses*WRONG_PENALTY);
  const matchedCount=Object.keys(state.matched).length;
  const progress=matchedCount/m.count;

  let html = `
  <nav class="nav">
    <div class="nav-logo">\uD83C\uDFAD Sonic Suspect</div>
    <div class="nav-mode">${m.label} \u00B7 ${m.grid}</div>
    <div class="nav-right">
      <div class="nav-stat"><div class="nav-stat-label">TIME</div><div class="nav-stat-value">${fmt(state.timeLeft)}</div></div>
      <div class="nav-stat"><div class="nav-stat-label">WRONG</div><div class="nav-stat-value">${state.wrongGuesses}</div></div>
      <div class="nav-stat"><div class="nav-stat-label">SCORE</div><div class="nav-stat-value">${fmt(score)}</div></div>
      <div class="nav-stat"><div class="nav-stat-label">FOUND</div><div class="nav-stat-value">${matchedCount}/${m.count}</div></div>
      <button class="btn-reset" onclick="initGame(state.mode)">\u21BA Reset</button>
    </div>
  </nav>
  <div class="progress-bar"><div class="progress-fill" style="width:${progress*100}%"></div></div>
  <div class="main">
    <div class="grid-area">`;

  if(!state.started){
    html+=`<div class="instructions"><strong>How to play:</strong> Click any card to hear a mystery voice. Then click the matching name from the panel on the right. Each wrong guess adds <span class="penalty">${WRONG_PENALTY} seconds</span> penalty. Highest remaining time wins. \uD83C\uDFA7</div>`;
  }

  html+=`<div class="card-grid grid-${m.grid}">`;
  state.cards.forEach((ch,i)=>{
    const solved=!!state.matched[ch.id];
    const isPlaying=state.playing===ch.id;
    const isHeard=!!state.heard[ch.id]&&!solved&&state.selectedCard===ch.id;
    const isWrong=state.wrongFlash===ch.id;
    const pastel=state.pastelAssign[ch.id]||PASTEL_CLASSES[i%PASTEL_CLASSES.length];
    let cls='card';
    if(solved) cls+=' solved';
    if(isPlaying) cls+=' playing';
    if(isHeard) cls+=' heard';
    if(isWrong) cls+=' wrong-flash';

    html+=`<div class="${cls}" onclick="handleCardClick(${ch.id})">
      <div class="card-inner">
        <div class="card-front ${pastel}">`;
    if(isPlaying){
      html+=`<div class="sound-bars">${[14,22,18,26,16].map((h,j)=>`<div class="sound-bar" style="height:${h}px;animation-delay:${j*0.08}s"></div>`).join('')}</div>
        <div class="card-label">PLAYING\u2026</div>`;
    } else if(isHeard){
      html+=`<div class="card-icon">\uD83D\uDD0A</div><div class="card-label">PICK A NAME \u2192</div>`;
    } else {
      html+=`<div class="card-icon">\uD83C\uDFAD</div><div class="card-label">TAP TO HEAR</div>`;
    }
    html+=`</div>
        <div class="card-back ${pastel}" style="border:2px solid ${ch.color}">
          <div class="solved-emoji">${ch.emoji}</div>
          <div class="solved-check">\u2713</div>
        </div>
      </div>`;
    if(state.penaltyCard===ch.id) html+=`<div class="penalty-flash">-${WRONG_PENALTY}s</div>`;
    html+=`</div>`;
  });
  html+=`</div></div>`;

  // Sidebar
  html+=`<div class="sidebar">
    <div class="diff-bar">
      <button class="diff-btn ${state.mode==='easy'?'active':''}" onclick="initGame('easy')">Easy</button>
      <button class="diff-btn ${state.mode==='medium'?'active':''}" onclick="initGame('medium')">Medium</button>
      <button class="diff-btn ${state.mode==='hard'?'active':''}" onclick="initGame('hard')">Hard</button>
    </div>
    <div class="sidebar-title">${state.selectedCard?'\u2190 Now pick a name':'Click a card first \u2192'}</div>
    <div class="suspect-list">`;
  state.nameList.forEach(ch=>{
    const isMatched=!!state.matched[ch.id];
    const isSel=state.selectedName===ch.id;
    let cls='suspect';
    if(isMatched) cls+=' matched';
    if(isSel) cls+=' selected';
    html+=`<div class="${cls}" onclick="handleNameClick(${ch.id})">
      <span class="suspect-emoji">${ch.emoji}</span>
      <span style="flex:1">${ch.name}</span>
      ${isMatched?'<span class="suspect-check">\u2713</span>':''}
    </div>`;
  });
  html+=`</div></div></div>`;

  // Win overlay
  if(state.finished && matchedCount===m.count){
    const nextMode=state.mode==='easy'?'medium':state.mode==='medium'?'hard':null;
    html+=`<div class="win-overlay">
      <div class="win-box">
        <div class="win-emoji">\uD83C\uDFAD</div>
        <div class="win-title">Case Closed!</div>
        <div class="win-sub">Your ears are sharper than most.</div>
        <div class="win-stats">
          <div class="win-stat"><div class="win-stat-val" style="color:#4d96ff">${fmt(state.timeLeft)}</div><div class="win-stat-label">time left</div></div>
          <div class="win-op">\u2212</div>
          <div class="win-stat"><div class="win-stat-val" style="color:#e53e3e">${state.wrongGuesses*WRONG_PENALTY}s</div><div class="win-stat-label">${state.wrongGuesses} wrong \u00D7${WRONG_PENALTY}s</div></div>
          <div class="win-op">=</div>
          <div class="win-stat"><div class="win-stat-val" style="color:#ff6b6b">${fmt(score)}</div><div class="win-stat-label">final score</div></div>
        </div>
        <button class="win-btn" onclick="initGame('${state.mode}')">Play Again</button>
        ${nextMode?`<button class="win-btn secondary" onclick="initGame('${nextMode}')">Try Harder</button>`:''}
      </div>
    </div>`;
  }

  // Time ran out
  if(state.finished && matchedCount<m.count){
    html+=`<div class="win-overlay">
      <div class="win-box">
        <div class="win-emoji">\u23F0</div>
        <div class="win-title">Time's Up!</div>
        <div class="win-sub">You found ${matchedCount} of ${m.count} suspects.</div>
        <div class="win-stats">
          <div class="win-stat"><div class="win-stat-val" style="color:#e53e3e">${state.wrongGuesses}</div><div class="win-stat-label">wrong guesses</div></div>
          <div class="win-op">\u00B7</div>
          <div class="win-stat"><div class="win-stat-val" style="color:#38a169">${matchedCount}/${m.count}</div><div class="win-stat-label">found</div></div>
        </div>
        <button class="win-btn" onclick="initGame('${state.mode}')">Try Again</button>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
}

initGame('hard');
</script>
</body>
</html>
